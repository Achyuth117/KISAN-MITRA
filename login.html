<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Kisan Mitra</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-layout { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: url('https://images.unsplash.com/photo-1595841696677-6489ff3f8cd1?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover; position: relative; }
        .auth-layout::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(16, 185, 129, 0.9), rgba(4, 120, 87, 0.95)); }
        .auth-card { position: relative; z-index: 10; padding: 3rem; background: white; border-radius: var(--radius-lg); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); width: 100%; max-width: 420px; }
        .error-msg { color: #DC2626; font-size: 0.875rem; text-align: center; margin-bottom: 1rem; display: none; }
    </style>
</head>
<body>
    <div class="auth-layout">
        <div class="auth-card fade-up">
            <div class="logo text-center" style="margin-bottom: 2rem;">
                <a href="index.html" style="justify-content: center;"><i class="fa-solid fa-leaf"></i> Kisan Mitra</a>
            </div>
            
            <h3 class="text-center" style="margin-bottom: 1.5rem; font-size: 1.5rem;">Welcome back</h3>
            <div id="errorBox" class="error-msg"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="you@company.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1rem;" id="loginBtn">Sign In to Web Dashboard</button>
                <button type="button" class="btn btn-outline" style="width: 100%; margin-bottom: 1.5rem;" onclick="window.location.href='how-it-works.html#whatsapp-demo'">Farmer Login (Use WhatsApp)</button>
            </form>
            
            <p class="text-center" style="font-size: 0.875rem; color: var(--text-muted);">
                Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: 600;">Sign up as Buyer</a>
            </p>
        </div>
    </div>
    <script src="js/script.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errBox = document.getElementById('errorBox');
            btn.innerText = 'Signing in...';
            btn.disabled = true;
            errBox.style.display = 'none';
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                
                const data = await res.json();
                if(res.ok) {
                    setAuth(data);
                    window.location.href = data.role === 'admin' ? 'admin-dashboard.html' : 'buyer-dashboard.html';
                } else {
                    errBox.innerText = data.detail || 'Login failed';
                    errBox.style.display = 'block';
                }
            } catch (err) {
                errBox.innerText = 'Connection error. Is the backend running?';
                errBox.style.display = 'block';
            } finally {
                btn.innerText = 'Sign In to Dashboard';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
