<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Kisan Mitra</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-layout { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: url('https://images.unsplash.com/photo-1595841696677-6489ff3f8cd1?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover; position: relative; padding: 2rem; }
        .auth-layout::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(16, 185, 129, 0.9), rgba(4, 120, 87, 0.95)); }
        .auth-card { position: relative; z-index: 10; padding: 3rem; background: white; border-radius: var(--radius-lg); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); width: 100%; max-width: 500px; }
        .error-msg { color: #DC2626; font-size: 0.875rem; text-align: center; margin-bottom: 1rem; display: none; }
    </style>
</head>
<body>
    <div class="auth-layout">
        <div class="auth-card fade-up">
            <div class="logo text-center" style="margin-bottom: 2rem;">
                <a href="index.html" style="justify-content: center;"><i class="fa-solid fa-leaf"></i> Kisan Mitra</a>
            </div>
            
            <h3 class="text-center" style="margin-bottom: 0.5rem; font-size: 1.5rem;">Create your account</h3>
            <p class="text-center" style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 2rem;">Start securing rural harvests today.</p>
            <div id="errorBox" class="error-msg"></div>
            
            <form id="registerForm">
                <div class="grid-2" style="gap: 1rem; margin-bottom: 0;">
                    <div class="form-group">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label for="lname">Last Name</label>
                        <input type="text" id="lname" placeholder="Doe" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">Work Email</label>
                    <input type="email" id="email" placeholder="you@company.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Create Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; margin-bottom: 1rem;" id="regBtn">Sign Up as Buyer</button>
                <button type="button" class="btn btn-outline" style="width: 100%; margin-bottom: 1.5rem;" onclick="window.location.href='how-it-works.html#whatsapp-demo'">I am a Farmer (Use WhatsApp)</button>
            </form>
            
            <p class="text-center" style="font-size: 0.875rem; color: var(--text-muted);">
                Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600;">Sign in here</a>
            </p>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const errBox = document.getElementById('errorBox');
            btn.innerText = 'Creating account...';
            btn.disabled = true;
            errBox.style.display = 'none';
            
            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        first_name: document.getElementById('fname').value,
                        last_name: document.getElementById('lname').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                
                const data = await res.json();
                if(res.ok) {
                    setAuth(data);
                    window.location.href = 'buyer-dashboard.html';
                } else {
                    errBox.innerText = data.detail || 'Registration failed';
                    errBox.style.display = 'block';
                }
            } catch (err) {
                errBox.innerText = 'Connection error. Is the backend running?';
                errBox.style.display = 'block';
            } finally {
                btn.innerText = 'Sign Up';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
